---
configuration:
  MQTT_URI:
    name: "MQTT URI"
    description: "example mqtt://LOGIN:PASSWORD@MQTT_SERVER:PORT or mqtt://MQTT_SERVER:PORT"
  LOCATIONS:
    name: "Locations"
    description: "Comma-separated slugs using the exact URL format of lameteoagricole.net (Town-Zip). Example: Saint-Etienne-42000,Paris-75001"
  SCAN_INTERVAL:
    name: "Scan interval"
    description: "Seconds between two full refresh cycles (default 300)"
  CITY_DELAY:
    name: "Delay between cities"
    description: "Seconds between two locations inside a cycle (default 30)"
  DEBUG:
    name: "Debug verbose"
    description: "Must be DEBUG, MESSAGE or ERROR"
  MQTT_PREFIX:
    name: "Prefix on MQTT topic"
  MQTT_RETAIN:
    name: "Option retain enabled"
  MQTT_QOS:
    name: "MQTT QOS"
    description: "Must be 0, 1 or 2"
  HA_DISCOVERY:
    name: "Home Assistant auto discovery"
    description: "Enable Home Assistant auto discovery"
  HA_PREFIX:
    name: "Home Assistant prefix"
    description: "Prefix home assistant discovery in MQTT"
